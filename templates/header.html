<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="utf-8"/>
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="description" content=""/>
    <meta name="author" content=""/>
    <title>Marko's Blog</title>
    {% block styles %}
    <!-- Load Bootstrap-Flask CSS here -->
    {{ bootstrap.load_css() }}
    <script
            src="https://use.fontawesome.com/releases/v6.3.0/js/all.js"
            crossorigin="anonymous"
    ></script>
    <!-- Google fonts-->
    <link
            href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic"
            rel="stylesheet"
            type="text/css"
    />
    <link
            href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800"
            rel="stylesheet"
            type="text/css"
    />
    <!-- Core theme CSS (includes Bootstrap)-->
    <link
            href="{{ url_for('static', filename='css/styles.css') }}"
            rel="stylesheet"
    />
    {% endblock %}
</head>
<body>
<!-- Navigation-->
<nav class="navbar navbar-expand-lg navbar-light" id="mainNav">
    <div class="container px-4 px-lg-5">
        <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive"
                aria-expanded="false"
                aria-label="Toggle navigation"
        >
            Menu
            <i class="fas fa-bars"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ms-auto py-4 py-lg-0">
                <li class="nav-item">
                    <a
                            class="nav-link px-lg-3 py-3 py-lg-4"
                            href="{{ url_for('get_all_posts') }}"
                    >Home</a
                    >
                </li>
                <li class="nav-item">
                    <a
                            class="nav-link px-lg-3 py-3 py-lg-4"
                            href="{{ url_for('about') }}"
                    >About</a
                    >
                </li>
                <li class="nav-item">
                    <a
                            class="nav-link px-lg-3 py-3 py-lg-4"
                            href="{{ url_for('contact') }}"
                    >Contact</a
                    >
                </li>
                <!-- Only show Login/Register if user is logged out. Otherwise show "Log Out" -->
                {% if not current_user.is_authenticated: %}
                <li class="nav-item">
                    <a
                            class="nav-link px-lg-3 py-3 py-lg-4"
                            href="{{ url_for('login') }}"
                    >Login</a
                    >
                </li>
                <li class="nav-item">
                    <a
                            class="nav-link px-lg-3 py-3 py-lg-4"
                            href="{{ url_for('register') }}"
                    >Register</a
                    >
                </li>
                {% else: %}
                <li class="nav-item">
                <li class="nav-item profile-wrapper">
                    <div class="no-scroll-hide" id="profileButton">
                        <div class="profile-hover">

                            <!-- TRIGGER (ONLY SMALL ICON) -->
                            <img class="avatar"
                                 src="{{ user.profile.image_url if user.profile and user.profile.image_url else (user.email | gravatar) }}">

                            <!-- DROPDOWN -->
                            <div class="dropdown">
                                <div class="dropdown-header">
                                    <img class="avatar-mini"
                                         src="{{ user.profile.image_url if user.profile and user.profile.image_url else (user.email | gravatar) }}">
                                    <span>{{ user.name }}</span>
                                    <a href="{{ url_for('profile.profile', user_id=current_user.id) }}">View Profile</a>
                                </div>


                                <hr>

                                <a href="{{ url_for('edit_profile.edit_profile') }}">Edit Profile</a>
                                <a href="{{ url_for('logout') }}">Logout</a>

                            </div>
                        </div>
                    </div>
                </li>
                </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
